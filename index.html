<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Notre Dame AR</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-assets>
            <a-asset-item id="catedral" src="catedral.glb"></a-asset-item>
        </a-assets>

        <a-marker preset="hiro">
            <!-- SCALE: 0.0004 para que sea un poco más pequeña -->
            <!-- ROTATION: He añadido 90 en el segundo valor para girar la fachada hacia ti -->
            <!-- POSITION: He puesto 0.5 en el último valor para que no te "atropelle" y se aleje un poco de la palabra Hiro -->
                <a-entity 
                    gltf-model="#catedral" 
                    scale="0.0004 0.0004 0.0004" 
                    position="0 0 0.5" 
                    rotation="-90 90 0">
                </a-entity>
        </a-marker>

        <!-- Luces para que la catedral no se vea oscura -->
        <a-entity light="type: ambient; intensity: 1.5;"></a-entity>
        <a-entity light="type: directional; intensity: 0.5" position="1 2 1"></a-entity>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
