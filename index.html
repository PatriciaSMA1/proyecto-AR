<!DOCTYPE html>
<html>
<head>
    <title>Proyecto Final AR</title>
    <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">

    <a-assets>
        <!-- Aquí es donde le dices qué archivo leer -->
        <a-asset-item id="mi-modelo" src="enano.glb?v=1"></a-asset-item>
    </a-assets>

<a-marker preset="hiro">
    <a-entity 
        gltf-model="#mi-modelo"
        position="0 0 0"
        rotation="0 0 0"
        scale="1 1 1">
    </a-entity>
    </a-marker>

        <!-- He añadido luces para que tu modelo se vea con mejores colores -->
        <a-entity light="type: ambient; intensity: 0.8; color: #FFF"></a-entity>
        <a-entity light="type: directional; intensity: 0.6" position="-1 2 1"></a-entity>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
